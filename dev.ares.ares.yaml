app-id: dev.ares.ares
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: ares
rename-desktop-file: ares.desktop
rename-icon: ares
finish-args:
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --socket=x11
  - --device=all
  - --filesystem=host
modules:
  - name: librashader
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/librashader/cargo
    build-commands:
      - cargo run -p librashader-build-script -- --profile optimized
      - mkdir ${FLATPAK_DEST}/lib && cp -r target/optimized/librashader.so ${FLATPAK_DEST}/lib/librashader.so
      - mkdir -p ${FLATPAK_DEST}/include/librashader/ && cp -r include/* ${FLATPAK_DEST}/include/librashader/
    sources:
      - type: archive
        archive-type: tar
        url: https://api.github.com/repos/SnowflakePowered/librashader/tarball/librashader-v0.11.0
        sha256: 231dd2dde1365a62fb53db7eaad2f75f1293c349a9483e6a46199a5525d8416e
      - cargo-sources.json
  - name: slang-shaders
    make-install-args:
      - PREFIX=${FLATPAK_DEST}
    sources:
      - type: git
        url: https://github.com/libretro/slang-shaders.git
        commit: cef2de6123cccbf0393ed6071ffd6e4a8d092145
  - name: ares
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -W no-dev
      - -D CMAKE_BUILD_TYPE=RelWithDebInfo
      - -D CMAKE_INSTALL_PREFIX=/app
      - -D CMAKE_PREFIX_PATH=/app
      - -D ARES_BUILD_LOCAL=OFF
      - -D ARES_BUNDLE_SHADERS=OFF
      - -D ARES_SKIP_DEPS=ON
      - -D ARES_BUILD_OFFICIAL=YES
      - -G Ninja
    sources:
      - type: archive
        archive-type: tar
        url: https://api.github.com/repos/ares-emulator/ares/tarball/v148
        sha256: 81031f7a59aa59aa255930b6dcfebecadc4e38f15bad0b4ed19b2361cec88b92
        x-checker-data:
          type: json
          url: https://api.github.com/repos/ares-emulator/ares/releases/latest
          version-query: .tag_name | sub("^v"; "")
          timestamp-query: .published_at
          url-query: .tarball_url
  - name: ares-metadata
    buildsystem: simple
    build-commands:
      - install -D -m 644 -t $FLATPAK_DEST/share/metainfo $FLATPAK_ID.metainfo.xml
    sources:
      - type: file
        path: dev.ares.ares.metainfo.xml
